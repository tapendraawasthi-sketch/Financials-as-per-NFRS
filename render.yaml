services:
  - type: web
    name: nfrs-financials
    runtime: node
    repo: https://github.com/tapendraawasthi-sketch/Financials-as-per-NFRS
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
    healthCheckPath: /api/health
