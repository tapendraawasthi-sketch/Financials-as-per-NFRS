services:
  - type: web
    name: nfrs-financials
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
    healthCheckPath: /api/health
    autoDeploy: true
